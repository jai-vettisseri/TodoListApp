<div class="home-page">
  <div class="page-header">
    <h2>All Todos</h2>
  </div>
  <div class="actions-panel">
    <button (click)="addNew()" class="btn btn-primary">Add Todo</button>
    <label class="actions-panelright">
      <input type="checkbox" [(ngModel)]="showCompleted" (change)="onShowCompletedChange()" [disabled]="loading" />
      <span>Show Completed & Inactive</span>
    </label>
  </div>

  <div class="actions-panel">
    <mat-progress-spinner *ngIf="loading" diameter="20" mode="indeterminate"></mat-progress-spinner>
    <input class="actions-panelright" placeholder="Filter by title..." [(ngModel)]="filterText" (ngModelChange)="applyFilter()" />
  </div>

  <div *ngIf="loading">Loading...</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div *ngIf="!loading && filtered.length > 0" class="grid-table">
    <table mat-table [dataSource]="filtered" class="mat-elevation-z1" style="width:100%">

      <!-- Title Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef> Title </th>
        <td mat-cell *matCellDef="let element"> {{element.title}} </td>
      </ng-container>

      <!-- Description Column -->
      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Description </th>
        <td mat-cell *matCellDef="let element"> {{element.description}} </td>
      </ng-container>

      <!-- Due Date Column -->
      <ng-container matColumnDef="dueDate">
        <th mat-header-cell *matHeaderCellDef> Due Date </th>
        <td mat-cell *matCellDef="let element"> {{ element.dueDate ? (element.dueDate | date:'dd/MM/yyyy') : '' }} </td>
      </ng-container>



      <!-- Status Column -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status <!-- noop: keep header for wiring --> </th>
        <td mat-cell *matCellDef="let element"> {{element.status}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button (click)="edit(element.id)" aria-label="Edit"><span>✏️</span></button>
          <button mat-icon-button color="warn" (click)="delete(element.id)" aria-label="Delete"><span>🗑️</span></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>

  <div *ngIf="!loading && filtered.length === 0">No todos found.</div>
</div>
